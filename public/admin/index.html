<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Admin - Live Broadcast</title>
  <link rel="stylesheet" href="/admin/styles.css">
  <!-- Configure your server URL here -->
  <script>
    window.SERVER_URL = ''; // Leave empty for same origin, or set to 'https://your-server.com'
    window.API_URL = '';    // Leave empty for same origin, or set to 'https://your-server.com'
  </script>
</head>
<body>
  <div id="loading-screen" class="screen">
    <div class="loader-box">
      <div class="spinner"></div>
      <p>Checking authentication...</p>
    </div>
  </div>

  <div id="login-screen" class="screen hidden">
    <div class="login-box">
      <h1>Radio Admin</h1>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <div id="dashboard-screen" class="screen hidden">
    <header>
      <h1>Radio Admin</h1>
      <div class="header-right">
        <span id="live-indicator" class="indicator offline">● Offline</span>
        <span id="listener-count">Listeners: 0</span>
        <button id="logout-btn">Logout</button>
      </div>
    </header>

    <main>
      <section class="channel-section">
        <h2>My Channels</h2>
        <div class="channel-selector">
          <select id="channel-select">
            <option value="">Select a channel...</option>
          </select>
          <button id="create-channel-btn" class="btn secondary">+ New Channel</button>
        </div>
        <div id="channel-form" class="channel-form hidden">
          <input type="text" id="channel-name" placeholder="Channel Name" required>
          <input type="text" id="channel-description" placeholder="Description (optional)">
          <input type="color" id="channel-color" value="#e94560">
          <div class="form-actions">
            <button id="save-channel-btn" class="btn primary">Save</button>
            <button id="cancel-channel-btn" class="btn secondary">Cancel</button>
          </div>
        </div>
        <p id="channel-status" class="status"></p>
      </section>

      <section class="broadcast-section">
        <h2>Broadcast Control</h2>
        <div class="controls">
          <button id="start-broadcast-btn" class="btn primary">Start Broadcast</button>
          <button id="stop-broadcast-btn" class="btn danger" disabled>Stop Broadcast</button>
        </div>
        <p id="broadcast-status" class="status">Select a channel to start broadcasting</p>
      </section>

      <section class="recording-section">
        <h2>Recording</h2>
        <div class="controls">
          <button id="start-recording-btn" class="btn secondary" disabled>Start Recording</button>
          <button id="stop-recording-btn" class="btn danger" disabled>Stop Recording</button>
        </div>
        <p id="recording-status" class="status">Start broadcast to enable recording</p>
        <p id="recording-id" class="recording-id"></p>
      </section>

      <section class="recordings-section">
        <h2>Recordings</h2>
        <div id="recordings-list" class="recordings-list">
          <p class="empty">No recordings yet</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socketUrl = window.SERVER_URL || '';
    window.API_URL = window.API_URL || window.SERVER_URL || '';
    const socket = io(socketUrl);
  </script>
  <script src="/admin/app.js"></script>
</body>
</html>
