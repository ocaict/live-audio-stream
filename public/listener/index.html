<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OcaTech-Live | Premium Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/listener/styles.css">
</head>

<body>
  <div class="bg-glow"></div>
  <div class="container">
    <header>
      <div class="logo">
        <i data-lucide="radio" class="logo-icon"></i>
        <span>OcaTech-Live</span>
      </div>
      <div id="live-indicator" class="indicator offline">
        <span class="dot"></span>
        <span class="status-label">Offline</span>
      </div>
    </header>

    <main>
      <div class="player-card glass-card">
        <div class="channel-wrapper">
          <label for="channel-select">Select Station</label>
          <div class="custom-select">
            <select id="channel-select">
              <option value="">Loading channels...</option>
            </select>
            <i data-lucide="chevron-down" class="select-icon"></i>
          </div>
        </div>

        <div class="visualizer-container">
          <canvas id="visualizer"></canvas>
          <div class="station-icon-wrapper">
            <i data-lucide="music" class="music-icon"></i>
          </div>
          <div class="pulse-ring"></div>
        </div>

        <div class="info-section">
          <h2 id="status-text">Select a channel to listen</h2>
          <div class="meta-info">
            <span id="listener-count"><i data-lucide="users"></i> 0</span>
          </div>
        </div>

        <button id="listen-btn" class="listen-btn" disabled>
          <i data-lucide="play" class="btn-icon"></i>
          <span class="text">Listen Live</span>
        </button>

        <div class="player-controls">
          <audio id="audio-player"></audio>
        </div>
      </div>
    </main>

    <footer>
      <p>Powered by Advanced WebRTC • © 2024 OcaTech</p>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    window.SERVER_URL = '';
    lucide.createIcons();
  </script>
  <script src="/listener/app.js"></script>
</body>

</html>
