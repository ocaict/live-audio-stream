<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OcaTech-Live | Premium Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/listener/styles.css">
</head>

<body>
  <div class="bg-glow"></div>

  <!-- Premium Tune-In Overlay -->
  <div id="tune-in-overlay" class="tune-in-overlay">
    <div class="tune-in-content glass-card">
      <div class="tune-in-logo">
        <i data-lucide="radio" class="logo-icon large-logo"></i>
      </div>
      <h1 class="tune-in-title">Welcome to OcaTech-Live</h1>
      <p class="tune-in-subtitle">Premium 24/7 Digital Radio & Live Broadcasts</p>
      <button id="tune-in-btn" class="listen-btn hero-btn">
        <i data-lucide="music" class="btn-icon"></i>
        <span>TUNE IN NOW</span>
      </button>
      <div class="tune-in-footer">High Fidelity • Low Latency • Global Access</div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="logo">
        <i data-lucide="radio" class="logo-icon"></i>
        <span>OcaTech-Live</span>
      </div>
      <div id="live-indicator" class="indicator offline">
        <span class="dot"></span>
        <span class="status-label">Offline</span>
      </div>
    </header>

    <main>
      <div class="player-card glass-card">
        <div class="channel-wrapper">
          <label for="channel-select">Select Station</label>
          <div class="custom-select">
            <select id="channel-select">
              <option value="">Loading channels...</option>
            </select>
            <i data-lucide="chevron-down" class="select-icon"></i>
          </div>
        </div>

        <div class="visualizer-container">
          <canvas id="visualizer"></canvas>
          <div class="station-icon-wrapper">
            <i data-lucide="music" class="music-icon"></i>
          </div>
          <div class="pulse-ring"></div>
        </div>

        <div class="info-section">
          <h2 id="status-text">Select a channel to listen</h2>
          <!-- Auto-DJ: Now Playing ticker -->
          <div id="now-playing-bar" class="now-playing-bar" style="display:none;"></div>
          <div class="meta-info">
            <span id="listener-count"><i data-lucide="users"></i> 0</span>
          </div>
        </div>

        <div class="volume-control">
          <i data-lucide="volume-2" id="volume-icon"></i>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
        </div>

        <button id="listen-btn" class="listen-btn" disabled>
          <i data-lucide="play" class="btn-icon"></i>
          <span class="text">Listen Live</span>
        </button>

        <div class="player-controls">
          <audio id="audio-player"></audio>
        </div>
      </div>

      <!-- Live Chat Panel -->
      <div class="chat-panel glass-card">
        <div class="chat-header">
          <h3><i data-lucide="messages-square"></i> Live Chat</h3>
          <span id="chat-status" class="chat-status">Connected</span>
        </div>
        <div id="chat-messages" class="chat-messages">
          <div class="chat-placeholder">Welcome! Join the conversation below.</div>
        </div>
        <form id="chat-form" class="chat-input-area">
          <input type="text" id="chat-username" placeholder="Your name" maxlength="15" autocomplete="off">
          <div class="input-row">
            <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">
            <button type="submit" class="send-btn" id="send-btn">
              <i data-lucide="send"></i>
            </button>
          </div>
        </form>
      </div>
    </main>

    <footer>
      <p>Powered by Advanced WebRTC • © 2026 OcaTech</p>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    window.SERVER_URL = '';
    lucide.createIcons();
  </script>
  <script src="/listener/app.js"></script>
</body>

</html>
