<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OcaTech-Live</title>
  <link rel="stylesheet" href="/listener/styles.css">
  <!-- Configure your server URL here -->
  <script>
    window.SERVER_URL = ''; // Leave empty for same origin, or set to 'https://your-server.com'
  </script>
</head>

<body>
  <div class="container">
    <header>
      <h1>OcaTech-Live</h1>
      <span id="live-indicator" class="indicator offline">● Offline</span>
    </header>

    <main>
      <div class="player-card">
        <div class="channel-selector">
          <select id="channel-select">
            <option value="">Loading channels...</option>
          </select>
        </div>

        <div class="station-art">
          <div class="pulse-ring"></div>
          <div class="station-icon">📻</div>
        </div>

        <h2 id="status-text">Select a channel to listen</h2>
        <p id="listener-count" class="listener-count">Listeners: 0</p>

        <button id="listen-btn" class="listen-btn" disabled>
          <span class="icon">🔊</span>
          <span class="text">Listen Live</span>
        </button>

        <audio id="audio-player" controls></audio>
      </div>
    </main>

    <footer>
      <p>Powered by WebRTC</p>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Connect to server (same origin or external)
    const socketUrl = window.SERVER_URL || '';
    const socket = io(socketUrl);
  </script>
  <script src="/listener/app.js"></script>
</body>

</html>
