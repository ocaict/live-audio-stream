<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OcaTech-Live Embed Player</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff2d55;
            --bg: #0a0a0f;
            --card: rgba(20, 20, 30, 0.8);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: transparent;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .embed-player {
            width: 100%;
            height: 100%;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .station-art {
            width: 48px;
            height: 48px;
            background: linear-gradient(45deg, var(--primary), #6366f1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info {
            flex: 1;
            min-width: 0;
        }

        .station-name {
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status.live::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .brand-link {
            position: absolute;
            bottom: 4px;
            right: 12px;
            font-size: 0.55rem;
            color: var(--text-dim);
            text-decoration: none;
            opacity: 0.6;
        }

        .brand-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="embed-player">
        <div class="station-art" id="station-art">
            <i data-lucide="radio"></i>
        </div>

        <div class="info">
            <div class="station-name" id="station-name">Loading...</div>
            <div id="status" class="status">Connecting...</div>
        </div>

        <div class="controls">
            <button class="play-btn" id="play-btn" disabled>
                <i data-lucide="play" id="play-icon"></i>
            </button>
        </div>

        <a href="/" target="_blank" class="brand-link">ocaTech-live</a>
    </div>

    <audio id="audio-player"></audio>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('channel');
        const socket = io();
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const statusEl = document.getElementById('status');
        const nameEl = document.getElementById('station-name');
        const player = document.getElementById('audio-player');

        let isLive = false;
        let peerConnection = null;
        let isPlaying = false;

        lucide.createIcons();

        if (!channelId) {
            nameEl.textContent = 'Invalid Channel';
            statusEl.textContent = 'No ID provided';
        } else {
            socket.emit('join-channel', { channelId, role: 'listener' });
        }

        socket.on('channel-info', (data) => {
            nameEl.textContent = data.name || 'Private Station';
            if (data.color) {
                document.getElementById('station-art').style.background = data.color;
            }
        });

        socket.on('broadcast-status', (data) => {
            isLive = data.active;
            statusEl.textContent = isLive ? 'LIVE' : 'Offline';
            statusEl.className = 'status ' + (isLive ? 'live' : '');
            playBtn.disabled = !isLive;
            if (!isLive && isPlaying) stopPlayback();
        });

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        });

        async function startPlayback() {
            isPlaying = true;
            playIcon.setAttribute('data-lucide', 'pause');
            lucide.createIcons();
            socket.emit('request-offer', { channelId });
        }

        function stopPlayback() {
            isPlaying = false;
            playIcon.setAttribute('data-lucide', 'play');
            lucide.createIcons();
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
        }

        let rtcConfig = {
            iceServers: [{ urls: 'stun:stun.relay.metered.ca:80' }]
        };

        async function loadRTCConfig() {
            try {
                const res = await fetch('/api/status/rtc-config');
                const data = await res.json();
                if (data.iceServers) {
                    rtcConfig = data;
                    console.log('[RTC] ICE Servers loaded from server');
                }
            } catch (e) {
                console.error('[RTC] Failed to load config:', e);
            }
        }

        loadRTCConfig();

        socket.on('offer', async (data) => {
            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.ontrack = (event) => {
                player.srcObject = event.streams[0];
                player.play().catch(e => {
                    console.warn('Autoplay prevented, ready to play on interaction');
                });
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', {
                        target: data.socketId,
                        candidate: event.candidate,
                        channelId
                    });
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', {
                target: data.socketId,
                sdp: answer.sdp,
                channelId
            });
        });

        socket.on('ice-candidate', async (data) => {
            if (peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });
    </script>
</body>

</html>
