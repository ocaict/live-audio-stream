<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OcaTech-Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
      color: #fff;
      min-height: 100vh;
    }
    .container { min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.5rem; color: #e94560; }
    .indicator { font-weight: bold; font-size: 0.9rem; }
    .indicator.offline { color: #666; }
    .indicator.live { color: #00d9a5; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .player-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .channel-selector { margin-bottom: 1.5rem; }
    #channel-select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #ffffff;
      font-size: 1rem;
      cursor: pointer;
    }
    #channel-select option { background: #1a1a2e; color: #ffffff; }
    .station-art { position: relative; width: 120px; height: 120px; margin: 0 auto 2rem; }
    .pulse-ring { position: absolute; inset: 0; border-radius: 50%; background: #e94560; opacity: 0; }
    .pulse-ring.active { animation: pulse-ring 2s ease-out infinite; }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
    .station-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: #16213e; border-radius: 50%; }
    .player-card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #a0a0a0; }
    .listener-count { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 16px 32px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }
    .listen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(233, 69, 96, 0.6); }
    .listen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .listen-btn.listening { background: #00d9a5; box-shadow: 0 4px 20px rgba(0, 217, 165, 0.4); }
    #status-text[data-type="connecting"] { color: #f39c12; }
    #status-text[data-type="success"] { color: #00d9a5; }
    #status-text[data-type="error"] { color: #e74c3c; }
    #audio-player { display: none; width: 100%; margin-top: 2rem; border-radius: 8px; }
    #audio-player.show { display: block; }
    footer { padding: 1.5rem; text-align: center; color: #444; font-size: 0.85rem; }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>OcaTech-Live</h1>
      <span id="live-indicator" class="indicator offline">● Offline</span>
    </header>
    <main>
      <div class="player-card">
        <div class="channel-selector">
          <select id="channel-select">
            <option value="">Loading channels...</option>
          </select>
        </div>
        <div class="station-art">
          <div class="pulse-ring"></div>
          <div class="station-icon">📻</div>
        </div>
        <h2 id="status-text">Select a channel to listen</h2>
        <p id="listener-count" class="listener-count">Listeners: 0</p>
        <button id="listen-btn" class="listen-btn" disabled>
          <span class="icon">🔊</span>
          <span class="text">Listen Live</span>
        </button>
        <audio id="audio-player" controls></audio>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 OcaTech-Live</p>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
  </script>
  <script>
    let peerConnection = null;
    let isListening = false;
    let reconnectAttempts = 0;
    let maxReconnectAttempts = 5;
    let reconnectDelay = 1000;
    let isReconnecting = false;
    let wasListeningBeforeDisconnect = false;
    let channels = [];
    let currentChannelId = null;

    const listenBtn = document.getElementById('listen-btn');
    const statusText = document.getElementById('status-text');
    const listenerCountEl = document.getElementById('listener-count');
    const liveIndicator = document.getElementById('live-indicator');
    const audioPlayer = document.getElementById('audio-player');
    const pulseRing = document.querySelector('.pulse-ring');
    const channelSelect = document.getElementById('channel-select');

    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function updateStatus(message, type = 'normal') {
      statusText.textContent = message;
      statusText.dataset.type = type;
    }

    async function loadChannels() {
      try {
        const res = await fetch('/api/channels');
        channels = await res.json();
        renderChannelSelector();
      } catch (e) {
        console.error('Failed to load channels:', e);
        channelSelect.innerHTML = '<option value="">Failed to load channels</option>';
      }
    }

    function renderChannelSelector() {
      if (channels.length === 0) {
        channelSelect.innerHTML = '<option value="">No channels available</option>';
        listenBtn.disabled = true;
        return;
      }
      channelSelect.innerHTML = channels.map(ch => 
        `<option value="${ch.id}" ${ch.isLive ? 'data-live="true"' : ''}>${ch.name} ${ch.isLive ? '● LIVE' : ''}</option>`
      ).join('');
      listenBtn.disabled = false;
      updateChannelStatus();
    }

    function updateChannelStatus() {
      const selectedOption = channelSelect.options[channelSelect.selectedIndex];
      const isLive = selectedOption?.dataset?.live === 'true';
      liveIndicator.textContent = isLive ? '● Live' : '● Offline';
      liveIndicator.className = 'indicator ' + (isLive ? 'live' : 'offline');
      if (isLive && !isListening) updateStatus('Broadcast is live - Click to listen');
      else if (!isListening) updateStatus('Select a channel to listen');
    }

    async function startListening() {
      if (isListening) { stopListening(); return; }
      currentChannelId = channelSelect.value;
      if (!currentChannelId) { updateStatus('Please select a channel', 'error'); return; }
      const channel = channels.find(c => c.id === currentChannelId);
      if (!channel || !channel.isLive) { updateStatus('This channel is not live', 'error'); return; }

      console.log('Starting listener on channel:', currentChannelId);
      wasListeningBeforeDisconnect = true;
      socket.emit('join-channel', { channelId: currentChannelId, role: 'listener' });
      peerConnection = new RTCPeerConnection(rtcConfig);

      peerConnection.ontrack = (event) => {
        if (event.streams[0]) {
          audioPlayer.srcObject = event.streams[0];
          audioPlayer.play().then(() => {
            updateStatus('Listening live!', 'success');
            pulseRing.classList.add('active');
          }).catch(e => console.error('Play failed:', e));
        }
      };

      peerConnection.oniceconnectionstatechange = () => { handleIceStateChange(peerConnection.iceConnectionState); };
      peerConnection.onicecandidate = (event) => {
        if (event.candidate) socket.emit('ice-candidate', { target: 'broadcaster', candidate: event.candidate, channelId: currentChannelId });
      };

      try {
        const offer = await peerConnection.createOffer({ offerToReceiveAudio: true });
        await peerConnection.setLocalDescription(offer);
        socket.emit('offer', { sdp: offer.sdp, socketId: socket.id, channelId: currentChannelId });
        socket.emit('join-as-listener', { channelId: currentChannelId });
        listenBtn.classList.add('listening');
        listenBtn.querySelector('.text').textContent = 'Stop';
        updateStatus('Connecting...', 'connecting');
        isListening = true;
        reconnectAttempts = 0;
      } catch (e) { updateStatus('Error: ' + e.message, 'error'); }
    }

    function handleIceStateChange(state) {
      const statesToReconnect = ['failed', 'disconnected', 'closed'];
      if (statesToReconnect.includes(state) && isListening && !isReconnecting) attemptReconnect();
    }

    function attemptReconnect() {
      if (isReconnecting || reconnectAttempts >= maxReconnectAttempts) {
        if (reconnectAttempts >= maxReconnectAttempts) { updateStatus('Connection lost. Please reconnect manually.', 'error'); stopListening(); }
        return;
      }
      isReconnecting = true;
      reconnectAttempts++;
      const delay = reconnectDelay * Math.pow(1.5, reconnectAttempts - 1);
      updateStatus(`Reconnecting... (${reconnectAttempts}/${maxReconnectAttempts})`, 'connecting');
      setTimeout(async () => {
        if (!isListening || !currentChannelId) { isReconnecting = false; return; }
        try {
          if (peerConnection) peerConnection.close();
          peerConnection = new RTCPeerConnection(rtcConfig);
          peerConnection.ontrack = (event) => { if (event.streams[0]) { audioPlayer.srcObject = event.streams[0]; audioPlayer.play().then(() => { updateStatus('Listening live!', 'success'); pulseRing.classList.add('active'); }).catch(e => {}); } };
          peerConnection.oniceconnectionstatechange = () => handleIceStateChange(peerConnection.iceConnectionState);
          peerConnection.onicecandidate = (event) => { if (event.candidate) socket.emit('ice-candidate', { target: 'broadcaster', candidate: event.candidate, channelId: currentChannelId }); };
          const offer = await peerConnection.createOffer({ offerToReceiveAudio: true });
          await peerConnection.setLocalDescription(offer);
          socket.emit('offer', { sdp: offer.sdp, socketId: socket.id, channelId: currentChannelId });
          socket.emit('join-as-listener', { channelId: currentChannelId });
          isReconnecting = false;
          reconnectAttempts = 0;
        } catch (e) { isReconnecting = false; attemptReconnect(); }
      }, delay);
    }

    function stopListening() {
      wasListeningBeforeDisconnect = false;
      isListening = false;
      isReconnecting = false;
      reconnectAttempts = 0;
      if (peerConnection) { peerConnection.close(); peerConnection = null; }
      if (currentChannelId) socket.emit('leave-listener');
      audioPlayer.srcObject = null;
      audioPlayer.pause();
      listenBtn.classList.remove('listening');
      listenBtn.querySelector('.text').textContent = 'Listen Live';
      updateStatus('Select a channel to listen');
      pulseRing.classList.remove('active');
      currentChannelId = null;
    }

    channelSelect.addEventListener('change', () => { if (isListening) stopListening(); updateChannelStatus(); });
    listenBtn.addEventListener('click', startListening);

    socket.on('connect', () => { console.log('Socket connected'); loadChannels(); socket.emit('get-live-status'); });
    socket.on('disconnect', () => { if (isListening) updateStatus('Connection lost. Reconnecting...', 'connecting'); });
    socket.on('connect_error', (error) => { if (isListening) updateStatus('Connection error. Retrying...', 'error'); });
    socket.on('channels-list', (channelsData) => { channels = channelsData; renderChannelSelector(); });
    socket.on('channel-live', (data) => {
      const channel = channels.find(c => c.id === data.channelId);
      if (channel) channel.isLive = data.isLive;
      renderChannelSelector();
      if (currentChannelId === data.channelId) {
        liveIndicator.textContent = data.isLive ? '● Live' : '● Offline';
        liveIndicator.className = 'indicator ' + (data.isLive ? 'live' : 'offline');
        if (!data.isLive && isListening) { stopListening(); updateStatus('Broadcast ended', 'error'); }
      }
    });
    socket.on('listener-count', (data) => { if (currentChannelId === data.channelId) listenerCountEl.textContent = `Listeners: ${data.count}`; });
    socket.on('offer', async (data) => { if (!peerConnection || !currentChannelId) return; try { await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp })); const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer); socket.emit('answer', { socketId: data.socketId, sdp: answer.sdp, channelId: currentChannelId }); } catch (e) {} });
    socket.on('answer', async (data) => { if (!peerConnection) return; try { await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: data.sdp })); updateStatus('Listening live!', 'success'); pulseRing.classList.add('active'); } catch (e) {} });
    socket.on('ice-candidate', async (data) => { if (!peerConnection) return; try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch (e) {} });
    socket.on('broadcast-ended', () => { stopListening(); updateStatus('Broadcast ended', 'error'); });
    socket.on('no-broadcast', () => { updateStatus('Channel is not live', 'error'); stopListening(); });

    loadChannels();
  </script>
</body>

</html>
